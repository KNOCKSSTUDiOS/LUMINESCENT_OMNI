workflows:
  luminescent-omni:
    name: LUMINESCENT OMNI APK — KNOCKS NET
    max_build_duration: 60
    environment:
      node: 20
      java: 17
    cache:
      cache_paths:
        - $CM_BUILD_DIR/node_modules
    scripts:
      - name: Install npm dependencies
        script: npm install
      - name: Sync Capacitor → Android
        script: npx cap sync android
      - name: Build debug APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace
    artifacts:
      - android/app/build/outputs/apk/**/*.apk
    publishing:
      email:
        recipients:
          - gtamayo36@gmail.com
        notify:
          success: true
          failure: true
